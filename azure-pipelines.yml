# Branch -> environment mapping:
#   develop -> dev            (auto-deploy)
#   test    -> test            (auto-deploy)
#   main    -> production      (deploy gated behind the moathclinic-production
#                                Azure DevOps environment's approval check)

trigger:
  branches:
    include:
      - main
      - test
      - develop

pr:
  branches:
    include:
      - main
      - test
      - develop

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureServiceConnection: 'moath-sp-new'
  acrName: 'moathclinicacr'
  imageName: 'moathclinic-app'
  acrTerraformDir: '$(System.DefaultWorkingDirectory)/terraform/acr'
  terraformVersion: '1.7.5'
  trivySeverity: 'HIGH,CRITICAL'
  isDev: $[eq(variables['Build.SourceBranch'], 'refs/heads/develop')]
  isTest: $[eq(variables['Build.SourceBranch'], 'refs/heads/test')]
  isMain: $[eq(variables['Build.SourceBranch'], 'refs/heads/main')]

stages:
  # ---------------------------------------------------------------------
  # 1. Unit tests - run on every push/PR, gates the build
  # ---------------------------------------------------------------------
  - stage: Test
    displayName: 'Unit Tests'
    jobs:
      - job: PytestJob
        displayName: 'pytest'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.12'

          - script: |
              set -e
              cd app
              pip install -r requirements-dev.txt
              pytest --junitxml=$(System.DefaultWorkingDirectory)/test-results.xml
            displayName: 'Install deps & run pytest'

          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'test-results.xml'
              searchFolder: '$(System.DefaultWorkingDirectory)'

  # ---------------------------------------------------------------------
  # 2. Terraform for the shared ACR (created once, applied idempotently
  #    from whichever of the three deploy branches runs first)
  # ---------------------------------------------------------------------
  - stage: TerraformACR
    displayName: 'Terraform - Shared ACR'
    jobs:
      - job: TerraformJob
        displayName: 'Terraform'
        steps:
          - task: Bash@3
            displayName: 'Install Terraform $(terraformVersion)'
            inputs:
              targetType: inline
              script: |
                set -e
                curl -sLo /tmp/terraform.zip https://releases.hashicorp.com/terraform/$(terraformVersion)/terraform_$(terraformVersion)_linux_amd64.zip
                unzip -o /tmp/terraform.zip -d /tmp/tfinstall
                sudo mv /tmp/tfinstall/terraform /usr/local/bin/
                terraform version

          - task: AzureCLI@2
            displayName: 'Terraform Init / Plan / Apply'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              addSpnToEnvironment: true
              inlineScript: |
                set -e
                export ARM_CLIENT_ID=$servicePrincipalId
                export ARM_TENANT_ID=$tenantId
                export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
                export ARM_USE_OIDC=true
                export ARM_OIDC_TOKEN=$idToken

                cd $(acrTerraformDir)
                terraform init -input=false
                terraform validate
                terraform plan -input=false -out=tfplan

                if [ "$(isDev)" = "True" ] || [ "$(isTest)" = "True" ] || [ "$(isMain)" = "True" ]; then
                  echo "On a deploy branch: applying"
                  terraform apply -input=false -auto-approve tfplan
                else
                  echo "Not a deploy branch: skipping apply"
                fi

  # ---------------------------------------------------------------------
  # 3. Build & push the Docker image to the shared ACR
  # ---------------------------------------------------------------------
  - stage: BuildAndPush
    displayName: 'Build & Push Image'
    dependsOn:
      - Test
      - TerraformACR
    condition: and(succeeded(), or(eq(variables.isDev, true), eq(variables.isTest, true), eq(variables.isMain, true)))
    jobs:
      - job: BuildJob
        displayName: 'Build & Push'
        steps:
          - task: AzureCLI@2
            displayName: 'az acr build'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -e
                az acr build \
                  --registry $(acrName) \
                  --image $(imageName):$(Build.BuildId) \
                  ./app

  # ---------------------------------------------------------------------
  # 4. Security scan: Trivy image scan gates every environment's deploy
  # ---------------------------------------------------------------------
  - stage: SecurityScan
    displayName: 'Container Image Scan (Trivy)'
    dependsOn: BuildAndPush
    condition: succeeded()
    jobs:
      - job: TrivyScan
        displayName: 'Trivy scan'
        steps:
          - task: AzureCLI@2
            displayName: 'Install Trivy & scan image'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -e
                curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

                az acr login --name $(acrName)

                trivy image \
                  --severity $(trivySeverity) \
                  --exit-code 1 \
                  --ignore-unfixed \
                  $(acrName).azurecr.io/$(imageName):$(Build.BuildId)

  # ---------------------------------------------------------------------
  # 5. Per-environment Terraform + deploy, gated by branch
  # ---------------------------------------------------------------------
  - template: pipelines/templates/deploy-environment.yml
    parameters:
      environmentName: dev
      terraformDir: '$(System.DefaultWorkingDirectory)/terraform/environments/dev'
      k8sNamespace: dev
      adoEnvironment: moathclinic-dev
      branchCondition: "and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))"

  - template: pipelines/templates/deploy-environment.yml
    parameters:
      environmentName: test
      terraformDir: '$(System.DefaultWorkingDirectory)/terraform/environments/test'
      k8sNamespace: test
      adoEnvironment: moathclinic-test
      branchCondition: "and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/test'))"

  - template: pipelines/templates/deploy-environment.yml
    parameters:
      environmentName: production
      terraformDir: '$(System.DefaultWorkingDirectory)/terraform/environments/production'
      k8sNamespace: production
      adoEnvironment: moathclinic-production
      branchCondition: "and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))"

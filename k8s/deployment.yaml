apiVersion: apps/v1
kind: Deployment
metadata:
  name: moathclinic-app
  labels:
    app: moathclinic-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: moathclinic-app
  template:
    metadata:
      labels:
        app: moathclinic-app
    spec:
      containers:
        - name: moathclinic-app
          image: __IMAGE__
          ports:
            - containerPort: 5000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: moathclinic-db-secret
                  key: DATABASE_URL
            - name: APPLICATIONINSIGHTS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: moathclinic-appinsights-secret
                  key: APPLICATIONINSIGHTS_CONNECTION_STRING
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
